name: i18n CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync-locales:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync locale files
        run: node wasm/static/js/i18n-sync.js

      - name: Auto-commit locale changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(i18n): sync locale source-of-truth"
          file_pattern: "wasm/static/locales/*.json"
          branch: ${{ github.head_ref }}

  push-sources-to-tms:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
